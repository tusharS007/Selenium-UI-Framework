name: Test Automation Workflow

on:
  schedule:
  - cron: 30 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn test -X -Dbrowser=chrome -DisLambdaTest=false -DisHeadless=true
      
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
       name: Test Logs
       path: logs/

    - name: Upload Screenshots as Artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
       name: Screenshots
       path: screenshots/

    - name: Upload HTML Report as Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
       name: html-report
       path: extentReport.html

    - name: Test Execution Status
      if: always()
      run: | 
       if [ "${{ job.status }}" == "success" ]; then
         echo "✅ All tests passed"
       else
         echo "❌ Some tests failed - check the Build with Maven step logs"
       fi

    - name: Copy Report to gh-pages Folder
      if: always()

      run: |
        mkdir -p public/extent-reports
        cp -R extentReport.html public/extent-reports/report.html
        mkdir -p screenshots
        cp -R screenshots/ public/extent-reports/screenshots/ || echo "No screenshots to copy"
        touch public/extent-reports/.nojekyll
        ls -l

    - name: Deploy
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public/extent-reports/
        token: ${{ secrets.PAT }}
        clean: true
    
    
      
